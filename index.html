<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Consumption Classifier</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 text-center shadow main-card">

        <h1>💡 Electricity Consumption</h1>
        <p>Enter your electricity usage (kWh)</p>

        <input type="number" id="kwhInput" class="form-control mb-3" placeholder="Enter kWh">

        <button class="btn btn-pink" onclick="classifyConsumption()">Classify</button>

    </div>
</div>

<!-- External JS (IMPORTANT: at bottom) -->
<script src="main.js"></script>

</body>
</html>
